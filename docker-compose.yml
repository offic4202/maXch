version: '3.8'

services:
  app:
    build: .
    ports:
      - "3011:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/mazematch
    depends_on:
      - postgres
    networks:
      - maze-network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mazematch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - maze-network

volumes:
  postgres_data:

networks:
  maze-network:
    driver: bridge