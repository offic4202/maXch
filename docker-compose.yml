version: '3.8'

services:
  app:
    build: .
    ports:
      - "3011:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/maxch
    depends_on:
      - postgres
    networks:
      - maxch-network

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=your_secure_password
      - POSTGRES_DB=maxch
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - maxch-network

volumes:
  postgres_data:

networks:
  maxch-network:
    driver: bridge